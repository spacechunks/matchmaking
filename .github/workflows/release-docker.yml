name: matchmaking-release
on:
  push:
    branches:
      - main
jobs:
  docker-publish:
    strategy:
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-22.04-arm
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - name: setup docker buildx
        uses: docker/setup-buildx-action@v4
      - name: docker login
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: docker build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: build/controlplane.dockerfile
          push: true
          tags: ghcr.io/spacechunks/matchmaking:${{ github.sha }}
